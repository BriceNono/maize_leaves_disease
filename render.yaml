services:
  - type: web
    name: maize_leaves_disease
    runtime: python
    plan: free
    buildCommand: python -m pip install -r requirements.txt
    startCommand: python -m gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
    
