services:
  - type: web
    name: maizescan
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: model-storage
      mountPath: /opt/render/project/src/model
      sizeGB: 2